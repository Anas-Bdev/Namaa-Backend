
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="background-color: #f4f7f6; margin: 0; padding: 20px; font-family: Arial, Helvetica, sans-serif; -webkit-font-smoothing: antialiased; color: #333333;">

    <div dir="ltr" style="max-width: 560px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.06);">

        <div style="background-color: #16a34a; background: linear-gradient(90deg, #16a34a, #22c55e); padding: 30px 20px; text-align: center;">
            <h1 style="color: #ffffff; margin: 0; font-size: 28px; font-weight: 800; letter-spacing: 1px; font-family: Arial, Helvetica, sans-serif;">NAMA'A</h1>
        </div>

        <div style="padding: 40px 30px; text-align: center;">
            
            <h2 style="margin: 0 0 30px 0; color: #111827; font-size: 22px; font-weight: 600; font-family: Arial, Helvetica, sans-serif;">Verify your email address</h2>
            
            <div style="text-align: left; margin-bottom: 36px;">
                <p style="margin: 0 0 16px 0; font-size: 16px; line-height: 26px; color: #4b5563; font-family: Arial, Helvetica, sans-serif;">Hi <strong>{{SafeName}}</strong>,</p>
                <p style="margin: 0; font-size: 16px; line-height: 26px; color: #4b5563; font-family: Arial, Helvetica, sans-serif;">
                    Welcome to NAMA'A! We're excited to have you. Click the button below to verify your email and activate your account securely.
                </p>
            </div>

            <div style="text-align: center; margin-bottom: 10px;">
                <a href="{{ConfirmLink}}" 
                   style="background-color: #16a34a; color: #ffffff; padding: 16px 40px; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 16px; display: inline-block; box-shadow: 0 4px 8px rgba(22, 163, 74, 0.2); font-family: Arial, Helvetica, sans-serif;">
                   Verify Email
                </a>
            </div>
        </div>

        <div style="background-color: #f8fafc; padding: 24px 20px; text-align: center; border-top: 1px solid #f1f5f9;">
            <p style="margin: 0; font-size: 13px; color: #94a3b8; font-family: Arial, Helvetica, sans-serif;">If you didn't create an account, you can safely ignore this email.</p>
            <p style="margin: 8px 0 0 0; font-size: 13px; color: #94a3b8; font-family: Arial, Helvetica, sans-serif;">&copy; 2026 NAMA'A Platform.</p>
        </div>

    </div>
</body>
</html>
